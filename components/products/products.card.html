<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px 24px; background: var(--color-warm-ivory); font-family: var(--font-body); }
  .label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border-subtle); margin-bottom: 24px; }
  .list-section { background: var(--surface-card); padding: 0 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { WineCard } = window.WasemDoppelstCkDesignSystem_9fe068;
const bottle = '../../assets/bottle-sample.png';

function Card() {
  return (
    <div>
      <div className="label">Grid Layout</div>
      <div className="grid">
        <WineCard name="WASEM WEISS" vintage="2022" price="€ 16,00"
          image={bottle} tags={['LEHM','KALK']} certifications={['BIO','VEGAN']} />
        <WineCard name="WASEM ROT" vintage="2021" price="€ 24,00"
          tags={['LEHM','SCHIEFER']} certifications={['BIO']} />
        <WineCard name="DOPPELSTÜCK ROSÉ" vintage="2023" price="€ 18,00"
          tags={['KALK']} certifications={['BIO','VEGAN']} />
        <WineCard name="PINOT NOIR" vintage="2020" price="€ 32,00"
          tags={['LEHM','KALK','SCHIEFER']} />
      </div>
      <div className="label">List Layout</div>
      <div className="list-section">
        <WineCard name="WASEM WEISS" vintage="2022" price="€ 16,00"
          image={bottle} tags={['LEHM','KALK']} certifications={['BIO','VEGAN']} variant="list" />
        <WineCard name="WASEM ROT" vintage="2021" price="€ 24,00"
          tags={['LEHM','SCHIEFER']} certifications={['BIO']} variant="list" />
        <WineCard name="PINOT NOIR" vintage="2020" price="€ 32,00"
          tags={['LEHM','KALK']} variant="list" />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Card />);
</script>
</body>
</html>
