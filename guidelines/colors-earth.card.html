<!-- @dsCard group="Colors" viewport="700x180" name="Earth Tones" subtitle="Rheinhessen Sand · Vineyard Soil · Vine Leaf · Sage · Slate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-warm-ivory); font-family: var(--font-body); }
  .row { display: flex; height: 180px; }
  .swatch { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 12px 14px; }
  .name { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .hex  { font-size: 11px; opacity: 0.65; }
  .light .name, .light .hex { color: var(--color-bottle-black); }
  .dark  .name, .dark  .hex { color: var(--color-warm-ivory); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch light" style="background:#D6C0A0">
    <div class="name">Rheinhessen Sand</div>
    <div class="hex">#D6C0A0</div>
  </div>
  <div class="swatch dark"  style="background:#9A7655">
    <div class="name">Vineyard Soil</div>
    <div class="hex">#9A7655</div>
  </div>
  <div class="swatch dark"  style="background:#263321">
    <div class="name">Vine Leaf Deep</div>
    <div class="hex">#263321</div>
  </div>
  <div class="swatch light" style="background:#A7A58E">
    <div class="name">Soft Sage</div>
    <div class="hex">#A7A58E</div>
  </div>
  <div class="swatch light" style="background:#686868">
    <div class="name">Slate Grey</div>
    <div class="hex">#686868</div>
  </div>
  <div class="swatch light" style="background:#C4A862">
    <div class="name">Harvest Gold</div>
    <div class="hex">#C4A862</div>
  </div>
</div>
</body>
</html>
