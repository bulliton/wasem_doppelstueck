<!-- @dsCard group="Spacing" viewport="700x200" name="Effects — Shadows · Radius · Motion" subtitle="Sharp corners · subtle elevation · restrained motion" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--color-warm-ivory); font-family: var(--font-body); }
  .row { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 18px; }
  .row:last-child { margin-bottom: 0; }
  .label { font-size: 9.5px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .shadow-box { background: white; padding: 12px 20px; font-size: 11px; color: var(--text-secondary); }
  .radius-box { background: var(--color-label-cream); padding: 10px 18px; font-size: 11px; color: var(--text-primary); display: inline-block; }
  .chip { display: inline-flex; padding: 4px 12px; border: 1px solid var(--border-default); font-size: 11px; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="label">Shadows</div>
      <div style="display:flex; gap:16px; align-items:flex-end">
        <div><div class="shadow-box" style="box-shadow:var(--shadow-xs)">xs</div></div>
        <div><div class="shadow-box" style="box-shadow:var(--shadow-sm)">sm</div></div>
        <div><div class="shadow-box" style="box-shadow:var(--shadow-md)">md</div></div>
        <div><div class="shadow-box" style="box-shadow:var(--shadow-lg)">lg</div></div>
      </div>
    </div>
    <div style="margin-left:32px">
      <div class="label">Border Radius</div>
      <div style="display:flex; gap:12px; align-items:center">
        <div><div class="radius-box" style="border-radius:0">Sharp 0</div></div>
        <div><div class="radius-box" style="border-radius:9999px">Pill 9999px</div></div>
        <div style="width:36px; height:36px; background:var(--color-label-cream); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text-secondary)">50%</div>
      </div>
    </div>
  </div>
  <div class="row">
    <div>
      <div class="label">Transitions</div>
      <div style="display:flex; gap:16px">
        <div style="font-size:11px; color:var(--text-secondary)">fast · 120ms</div>
        <div style="font-size:11px; color:var(--text-secondary)">base · 220ms</div>
        <div style="font-size:11px; color:var(--text-secondary)">slow · 380ms</div>
        <div style="font-size:11px; color:var(--text-secondary)">ease: cubic-bezier(0.4, 0, 0.2, 1)</div>
      </div>
    </div>
  </div>
</body>
</html>
