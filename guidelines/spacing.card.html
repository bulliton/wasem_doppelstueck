<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="8px base unit · generous whitespace" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 28px; background: var(--color-warm-ivory); font-family: var(--font-body); }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar { background: var(--color-vineyard-soil); height: 10px; flex-shrink: 0; }
  .label { font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; white-space: nowrap; min-width: 130px; }
</style>
</head>
<body>
  <div class="row"><div class="bar" style="width:4px"></div>   <div class="label">--space-1 · 4px</div></div>
  <div class="row"><div class="bar" style="width:8px"></div>   <div class="label">--space-2 · 8px</div></div>
  <div class="row"><div class="bar" style="width:12px"></div>  <div class="label">--space-3 · 12px</div></div>
  <div class="row"><div class="bar" style="width:16px"></div>  <div class="label">--space-4 · 16px</div></div>
  <div class="row"><div class="bar" style="width:24px"></div>  <div class="label">--space-6 · 24px</div></div>
  <div class="row"><div class="bar" style="width:32px"></div>  <div class="label">--space-8 · 32px</div></div>
  <div class="row"><div class="bar" style="width:64px"></div>  <div class="label">--space-16 · 64px · --section-sm</div></div>
  <div class="row"><div class="bar" style="width:96px"></div>  <div class="label">--space-24 · 96px · --section-md</div></div>
  <div class="row"><div class="bar" style="width:128px"></div> <div class="label">--space-32 · 128px · --section-lg</div></div>
</body>
</html>
