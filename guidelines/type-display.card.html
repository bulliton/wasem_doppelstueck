<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--color-warm-ivory); font-family: var(--font-display); color: var(--text-primary); }
  .row { display: flex; align-items: baseline; gap: 24px; margin-bottom: 20px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 16px; }
  .row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .meta { font-family: var(--font-body); font-size: 9.5px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; width: 120px; flex-shrink: 0; padding-top: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Light 300</div>
    <div style="font-size:36px; font-weight:300; line-height:1.1">Wein mit Charakter</div>
  </div>
  <div class="row">
    <div class="meta">Regular 400</div>
    <div style="font-size:36px; font-weight:400; line-height:1.1">Wein mit Charakter</div>
  </div>
  <div class="row">
    <div class="meta">Medium 500</div>
    <div style="font-size:36px; font-weight:500; line-height:1.1">Wein mit Charakter</div>
  </div>
  <div class="row">
    <div class="meta">SemiBold 600</div>
    <div style="font-size:36px; font-weight:600; line-height:1.1">Wein mit Charakter</div>
  </div>
  <div class="row">
    <div class="meta">Italic 400</div>
    <div style="font-size:36px; font-weight:400; font-style:italic; line-height:1.1">Guter Wein entsteht im Weinberg</div>
  </div>
  <div class="row">
    <div class="meta">Italic 500</div>
    <div style="font-size:28px; font-weight:500; font-style:italic; line-height:1.2; color:var(--text-secondary)">Authentisch. Regional. Handwerk.</div>
  </div>
</body>
</html>
