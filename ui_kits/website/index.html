<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasem Doppelstück — Homepage</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    body { background: var(--color-warm-ivory); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    button, input { font-family: inherit; }
    a { color: inherit; }
    img { display: block; max-width: 100%; }
    ::selection { background: var(--color-bottle-black); color: var(--color-warm-ivory); }
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: var(--color-label-cream); }
    ::-webkit-scrollbar-thumb { background: var(--color-rheinhessen-sand); }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

  <script type="text/babel" src="_components.jsx"></script>

  <script type="text/babel" src="home-nav.jsx"></script>
  <script type="text/babel" src="home-sections.jsx"></script>
  <script type="text/babel" src="home-extras.jsx"></script>
  <script type="text/babel" src="home-app.jsx"></script>
</body>
</html>
