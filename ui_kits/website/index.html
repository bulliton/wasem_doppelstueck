<!-- @dsCard group="Website" viewport="1440x900" name="Website" subtitle="Homepage · Wine Shop · Product Detail · Hotel · Events" -->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasem Doppelstück — Website Prototype</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--color-warm-ivory); overflow-x: hidden; }
    button { font-family: inherit; }
    a { color: inherit; }
    img { display: block; max-width: 100%; }
    ::selection { background: var(--color-bottle-black); color: var(--color-warm-ivory); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-label-cream); }
    ::-webkit-scrollbar-thumb { background: var(--color-rheinhessen-sand); }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head>
<body>
  <div id="root"></div>

  <!-- DS components registered to the namespace, then UI kit in dependency order -->
  <script type="text/babel" src="_components.jsx"></script>
  <script type="text/babel" src="Navigation.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel" src="HomePage.jsx"></script>
  <script type="text/babel" src="WineShop.jsx"></script>
  <script type="text/babel" src="ProductDetail.jsx"></script>
  <script type="text/babel" src="HotelPage.jsx"></script>
  <script type="text/babel" src="EventsPage.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
